<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOF套利监控 - 历史机会</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1f3460;
            --accent-primary: #00d4ff;
            --accent-success: #00ff88;
            --accent-warning: #ffaa00;
            --accent-danger: #ff4757;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6c6c7c;
            --border-color: #2a2a4a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #00d4ff, #7b2cbf); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text h1 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-text p { font-size: 12px; color: var(--text-muted); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .btn:hover { background: var(--bg-card-hover); border-color: var(--accent-primary); }
        .btn.primary { background: var(--accent-primary); color: #000; border: none; }
        .btn.danger { background: var(--accent-danger); color: #fff; border: none; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 300; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; max-width: 400px; width: 90%; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal-content { margin-bottom: 20px; }
        .modal-content label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        .modal-content input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px; border-radius: 8px; font-size: 14px; }
        .modal-content input:focus { outline: none; border-color: var(--accent-primary); }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-info { font-size: 12px; color: var(--text-muted); margin-top: 12px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab { padding: 12px 24px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
        .tab:hover { border-color: var(--accent-primary); }
        .tab.active { background: var(--accent-primary); color: #000; border-color: var(--accent-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; transition: all 0.2s; }
        .stat-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-value.premium { color: var(--accent-success); }
        .stat-value.discount { color: var(--accent-warning); }
        
        /* Filter */
        .filter-bar { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-label { font-size: 14px; color: var(--text-secondary); }
        .filter-select, .filter-input { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
        .filter-input { width: 200px; }
        .filter-select:focus, .filter-input:focus { outline: none; border-color: var(--accent-primary); }
        
        /* Chart */
        .chart-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
        
        /* History List */
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: all 0.2s; }
        .history-item:hover { border-color: var(--accent-primary); }
        .history-item-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .history-item-info { display: flex; align-items: center; gap: 16px; }
        .history-date { font-weight: 600; }
        .history-time { font-size: 14px; color: var(--text-muted); }
        .history-badge { background: var(--accent-primary); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .history-badge.empty { background: var(--text-muted); color: var(--text-primary); }
        .history-expand { color: var(--text-muted); transition: transform 0.2s; }
        .history-item.expanded .history-expand { transform: rotate(180deg); }
        .history-item-content { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border-color); }
        .history-item.expanded .history-item-content { display: block; }
        .opportunity-list { display: flex; flex-direction: column; gap: 12px; padding-top: 16px; }
        .opportunity-card { background: var(--bg-secondary); border-radius: 10px; padding: 16px; display: grid; grid-template-columns: 1fr auto; gap: 12px; }
        .opportunity-type { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .opportunity-type.premium { background: rgba(0, 255, 136, 0.15); color: var(--accent-success); }
        .opportunity-type.discount { background: rgba(255, 170, 0, 0.15); color: var(--accent-warning); }
        .opportunity-type.premium.urgent { background: rgba(255, 71, 87, 0.3); color: #ff6b7a; }
        .opportunity-type.discount.urgent { background: rgba(255, 71, 87, 0.3); color: #ff6b7a; }
        .opportunity-type.premium.focus { background: rgba(255, 170, 0, 0.25); color: #ffcc00; }
        .opportunity-type.discount.focus { background: rgba(255, 170, 0, 0.25); color: #ffcc00; }
        .rate-value { font-size: 24px; font-weight: 700; }
        .rate-value.positive { color: var(--accent-success); }
        .rate-value.negative { color: var(--accent-warning); }
        .scan-info { background: var(--bg-secondary); border-radius: 8px; padding: 12px 16px; margin-top: 12px; display: flex; gap: 24px; font-size: 12px; color: var(--text-muted); }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; padding: 16px; }
        .pagination-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .pagination-btn:hover:not(:disabled) { background: var(--bg-card-hover); border-color: var(--accent-primary); }
        .pagination-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-info { color: var(--text-secondary); font-size: 14px; padding: 0 16px; }
        
        /* Empty */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        
        /* Loading */
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 15, 35, 0.8); display: none; align-items: center; justify-content: center; z-index: 200; }
        .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--border-color); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .footer { text-align: center; padding: 32px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border-color); margin-top: 32px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📈</div>
                <div class="logo-text"><h1>LOF套利监控</h1><p>历史机会查看</p></div>
            </div>
            <div class="header-actions">
                <button class="btn primary" onclick="showTriggerModal()">🚀 手动扫描</button>
                <button class="btn" onclick="exportData()">📥 导出CSV</button>
                <button class="btn" onclick="loadData()">🔄 刷新</button>
            </div>
        </div>
    </header>
    
    <main class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('list')">📋 历史列表</div>
            <div class="tab" onclick="switchTab('chart')">📊 趋势图表</div>
        </div>
        <div class="stats-grid" id="stats-grid"></div>
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">搜索:</span>
                <input type="text" class="filter-input" id="search-input" placeholder="基金名称/代码" onkeyup="applyFilter()">
            </div>
            <div class="filter-group">
                <span class="filter-label">时间:</span>
                <select class="filter-select" id="days-filter" onchange="applyFilter()">
                    <option value="7">7天</option>
                    <option value="14">14天</option>
                    <option value="30" selected>30天</option>
                    <option value="60">60天</option>
                    <option value="90">90天</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">类型:</span>
                <select class="filter-select" id="type-filter" onchange="applyFilter()">
                    <option value="all">全部</option>
                    <option value="premium">溢价</option>
                    <option value="discount">折价</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">每页:</span>
                <select class="filter-select" id="page-size" onchange="changePageSize()">
                    <option value="5">5条</option>
                    <option value="10" selected>10条</option>
                    <option value="20">20条</option>
                    <option value="50">50条</option>
                </select>
            </div>
        </div>
        <div class="tab-content active" id="tab-list">
            <div class="history-list" id="history-list"></div>
            <div class="pagination" id="pagination" style="display: none;">
                <button class="pagination-btn" id="prev-btn" onclick="prevPage()">上一页</button>
                <span class="pagination-info" id="page-info"></span>
                <button class="pagination-btn" id="next-btn" onclick="nextPage()">下一页</button>
            </div>
        </div>
        <div class="tab-content" id="tab-chart">
            <div class="charts-grid">
                <div class="chart-container" style="height: 280px;">
                    <div class="chart-title">平均净收益率趋势</div>
                    <canvas id="rateChart"></canvas>
                </div>
                <div class="chart-container" style="height: 280px;">
                    <div class="chart-title">溢价/折价机会分布</div>
                    <canvas id="countChart"></canvas>
                </div>
                <div class="chart-container" style="height: 280px;">
                    <div class="chart-title">每日最佳机会净收益</div>
                    <canvas id="bestChart"></canvas>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Trigger Modal -->
    <div class="modal-overlay" id="trigger-modal">
        <div class="modal">
            <div class="modal-title">🚀 手动触发扫描</div>
            <div class="modal-content">
                <label>请输入 GitHub Token</label>
                <input type="password" id="trigger-token" placeholder="ghp_xxxx...">
                <div class="modal-info" id="trigger-info"></div>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="hideTriggerModal()">取消</button>
                <button class="btn primary" onclick="confirmTrigger()">确认触发</button>
            </div>
        </div>
    </div>
    
    <footer class="footer"><p>LOF套利监控 | 每交易日 10:00、14:00 自动更新</p></footer>
    <div class="loading-overlay" id="loading" style="display: none;"><div class="loading-spinner"></div></div>
    
    <script>
        // ========== 配置区域 ==========
        const CONFIG = {
            // Cloudflare Workers API 地址
            WORKER_URL: 'https://lof-monitor-api.arainzhe.workers.dev',
            
            // 访问密钥（从 localStorage 获取，首次使用需输入）
            get AUTH_KEY() {
                return localStorage.getItem('lof_auth_key') || '';
            },
            
            // 限制配置
            MAX_CALLS_PER_DAY: 5,              // 每天最多调用次数
            MIN_INTERVAL_MS: 15 * 60 * 1000   // 最小间隔 15 分钟
        };
        
        // ========== 触发限制逻辑 ==========
        function getTriggerRecord() {
            const record = localStorage.getItem('lof_trigger_record');
            return record ? JSON.parse(record) : { date: '', count: 0, lastTime: 0 };
        }
        
        function saveTriggerRecord(record) {
            localStorage.setItem('lof_trigger_record', JSON.stringify(record));
        }
        
        function checkTriggerLimit() {
            const now = Date.now();
            const today = new Date().toDateString();
            let record = getTriggerRecord();
            
            // 新的一天，重置计数
            if (record.date !== today) {
                record = { date: today, count: 0, lastTime: 0 };
                saveTriggerRecord(record);
            }
            
            // 检查次数
            if (record.count >= CONFIG.MAX_CALLS_PER_DAY) {
                return { canTrigger: false, message: `今天已达到上限 (${CONFIG.MAX_CALLS_PER_DAY}次)，请明天再试` };
            }
            
            // 检查间隔
            if (record.lastTime > 0 && (now - record.lastTime) < CONFIG.MIN_INTERVAL_MS) {
                const remaining = Math.ceil((CONFIG.MIN_INTERVAL_MS - (now - record.lastTime)) / 60000);
                return { canTrigger: false, message: `请等待 ${remaining} 分钟后再试` };
            }
            
            return { canTrigger: true, message: '', record };
        }
        
        // ========== 弹窗控制 ==========
        function showTriggerModal() {
            // 先检查限制
            const limit = checkTriggerLimit();
            if (!limit.canTrigger) {
                alert(limit.message);
                return;
            }
            
            // 检查是否已设置访问密钥
            const authKey = CONFIG.AUTH_KEY;
            const tokenInput = document.getElementById('trigger-token');
            const tokenLabel = tokenInput.parentElement.querySelector('label');
            
            if (!authKey) {
                // 首次使用，需要输入访问密码
                tokenLabel.textContent = '请输入访问密码';
                tokenInput.placeholder = '访问密码';
                tokenInput.type = 'password';
                tokenInput.value = '';
                document.getElementById('trigger-info').innerHTML = 
                    '首次使用需设置访问密码，密码将保存在本地浏览器。<br>今日已用: ' + 
                    getTriggerRecord().count + '/' + CONFIG.MAX_CALLS_PER_DAY + ' 次';
            } else {
                // 已有密码，显示更新选项
                tokenLabel.textContent = '访问密码（已保存，可修改）';
                tokenInput.placeholder = '留空使用已保存的密码';
                tokenInput.type = 'password';
                tokenInput.value = '';
                document.getElementById('trigger-info').innerHTML = 
                    '密码已保存在本地浏览器。<br>今日已用: ' + 
                    getTriggerRecord().count + '/' + CONFIG.MAX_CALLS_PER_DAY + ' 次';
            }
            
            document.getElementById('trigger-modal').classList.add('show');
            tokenInput.focus();
        }
        
        function hideTriggerModal() {
            document.getElementById('trigger-modal').classList.remove('show');
        }
        
        // ========== 触发扫描（通过 Workers API）==========
        async function confirmTrigger() {
            // 再次检查限制
            const limit = checkTriggerLimit();
            if (!limit.canTrigger) {
                alert(limit.message);
                hideTriggerModal();
                return;
            }
            
            // 获取密码
            let authKey = CONFIG.AUTH_KEY;
            const inputKey = document.getElementById('trigger-token').value.trim();
            
            if (inputKey) {
                // 用户输入了新密码，保存到 localStorage
                localStorage.setItem('lof_auth_key', inputKey);
                authKey = inputKey;
            }
            
            if (!authKey) {
                alert('请输入访问密码');
                return;
            }
            
            // 显示加载
            document.getElementById('loading').style.display = 'flex';
            hideTriggerModal();
            
            try {
                // 调用 Workers API（Token 在服务端，前端完全接触不到）
                const url = `${CONFIG.WORKER_URL}/trigger?key=${encodeURIComponent(authKey)}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 成功，更新记录
                    const record = limit.record;
                    record.count++;
                    record.lastTime = Date.now();
                    saveTriggerRecord(record);
                    
                    alert('✅ ' + result.message);
                } else {
                    // 如果是认证失败，清除保存的密码
                    if (result.message && result.message.includes('无效')) {
                        localStorage.removeItem('lof_auth_key');
                    }
                    alert('❌ ' + (result.message || '触发失败'));
                }
            } catch (e) {
                alert('❌ 请求失败: ' + e.message);
            }
            
            document.getElementById('loading').style.display = 'none';
        }
        
        // ========== 原有功能 ==========
        let historyData = [];
        let filteredData = [];
        let currentPage = 1;
        let pageSize = 10;
        let rateChart = null;
        let countChart = null;
        let bestChart = null;
        
        async function loadData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch('data/history.json?t=' + Date.now());
                historyData = await res.json();
                applyFilter();
            } catch (e) {
                document.getElementById('history-list').innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
            }
            document.getElementById('loading').style.display = 'none';
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'chart') renderCharts();
        }
        
        function applyFilter() {
            const days = parseInt(document.getElementById('days-filter').value);
            const type = document.getElementById('type-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            const cutoffStr = cutoff.toISOString().split('T')[0];
            
            filteredData = historyData.filter(r => {
                if (r.date < cutoffStr) return false;
                const filteredOpps = r.opportunities.filter(o => {
                    if (type === 'premium' && o.premium_rate < 0) return false;
                    if (type === 'discount' && o.premium_rate >= 0) return false;
                    if (search && !o.name.toLowerCase().includes(search) && !o.code.includes(search)) return false;
                    return true;
                });
                return filteredOpps.length > 0 || (r.opportunities.length === 0 && type === 'all');
            });
            
            currentPage = 1;
            renderStats();
            renderHistory();
            renderPagination();
        }
        
        function getFilteredOpportunities(opportunities) {
            const type = document.getElementById('type-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            return opportunities.filter(o => {
                if (type === 'premium' && o.premium_rate < 0) return false;
                if (type === 'discount' && o.premium_rate >= 0) return false;
                if (search && !o.name.toLowerCase().includes(search) && !o.code.includes(search)) return false;
                return true;
            });
        }
        
        function renderStats() {
            const type = document.getElementById('type-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            let total = filteredData.length, opps = 0, premium = 0, discount = 0;
            let netRates = [], bestOpp = null, bestNetRate = 0;
            
            filteredData.forEach(r => {
                const filteredOpps = r.opportunities.filter(o => {
                    if (type === 'premium' && o.premium_rate < 0) return false;
                    if (type === 'discount' && o.premium_rate >= 0) return false;
                    if (search && !o.name.toLowerCase().includes(search) && !o.code.includes(search)) return false;
                    return true;
                });
                opps += filteredOpps.length;
                filteredOpps.forEach(o => {
                    if (o.premium_rate >= 0) {
                        premium++;
                        const netRate = o.premium_rate - 0.28;
                        netRates.push(netRate);
                        if (netRate > bestNetRate) { bestNetRate = netRate; bestOpp = o; }
                    } else {
                        discount++;
                        const netRate = Math.abs(o.premium_rate) - 1.53;
                        netRates.push(netRate);
                        if (netRate > bestNetRate) { bestNetRate = netRate; bestOpp = o; }
                    }
                });
            });
            
            const avgNetRate = netRates.length > 0 ? (netRates.reduce((a,b) => a+b, 0) / netRates.length) : 0;
            
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><div class="stat-label">运行次数</div><div class="stat-value">${total}</div></div>
                <div class="stat-card"><div class="stat-label">发现机会</div><div class="stat-value">${opps}</div></div>
                <div class="stat-card"><div class="stat-label">溢价套利</div><div class="stat-value premium">${premium}</div></div>
                <div class="stat-card"><div class="stat-label">折价套利</div><div class="stat-value discount">${discount}</div></div>
                <div class="stat-card"><div class="stat-label">平均净收益</div><div class="stat-value" style="color:${avgNetRate >= 1 ? 'var(--accent-success)' : 'var(--accent-warning)'}">${avgNetRate >= 0 ? '+' : ''}${avgNetRate.toFixed(2)}%</div></div>
                <div class="stat-card"><div class="stat-label">最佳机会</div><div class="stat-value" style="font-size:16px;color:var(--accent-success)">${bestOpp ? bestOpp.name.slice(0,6) + ' ' + (bestNetRate >= 0 ? '+' : '') + bestNetRate.toFixed(2) + '%' : '-'}</div></div>
            `;
        }
        
        function renderHistory() {
            const container = document.getElementById('history-list');
            if (!filteredData.length) {
                container.innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
                return;
            }
            const start = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(start, start + pageSize);
            
            container.innerHTML = pageData.map((r, i) => {
                const idx = start + i;
                const filteredOpps = getFilteredOpportunities(r.opportunities);
                const has = filteredOpps.length > 0;
                return `
                    <div class="history-item" id="item-${idx}">
                        <div class="history-item-header" onclick="toggleItem(${idx})">
                            <div class="history-item-info">
                                <span class="history-date">${r.date}</span>
                                <span class="history-time">${r.time}</span>
                                <span class="history-badge ${has ? '' : 'empty'}">${has ? filteredOpps.length + '个机会' : '无机会'}</span>
                            </div>
                            <span class="history-expand">▼</span>
                        </div>
                        <div class="history-item-content">
                            ${has ? renderOpps(filteredOpps) : '<p style="padding:16px;color:var(--text-muted)">无套利机会</p>'}
                            <div class="scan-info">扫描:${r.scan_info?.scanned||0} 成功:${r.scan_info?.success||0} 过滤:${r.scan_info?.filtered||0}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderOpps(opps) {
            return `<div class="opportunity-list">${opps.map(o => {
                const isPrem = o.premium_rate >= 0;
                const absRate = Math.abs(o.premium_rate);
                
                // 计算净收益率
                let netRate;
                if (isPrem) {
                    // 溢价套利成本：申购0.15% + 佣金0.03% + 印花税0.1% = 0.28%
                    netRate = o.premium_rate - 0.28;
                } else {
                    // 折价套利成本：佣金0.03% + 赎回费1.5% = 1.53%
                    netRate = absRate - 1.53;
                }
                
                // 获取套利级别
                let level, levelClass;
                if (isPrem) {
                    if (o.premium_rate >= 15) { level = '异常'; levelClass = 'abnormal'; }
                    else if (o.premium_rate >= 8) { level = '紧急'; levelClass = 'urgent'; }
                    else if (o.premium_rate >= 5) { level = '重点'; levelClass = 'focus'; }
                    else { level = '普通'; levelClass = 'normal'; }
                } else {
                    if (absRate >= 8) { level = '紧急'; levelClass = 'urgent'; }
                    else if (absRate >= 5) { level = '重点'; levelClass = 'focus'; }
                    else { level = '普通'; levelClass = 'normal'; }
                }
                
                // 格式化规模和成交额
                const sizeStr = o.fund_size ? `${o.fund_size.toFixed(0)}亿` : '-';
                const amountStr = o.amount ? `${(o.amount/100).toFixed(0)}万` : '-';
                
                return `
                    <div class="opportunity-card">
                        <div>
                            <span class="opportunity-type ${isPrem ? 'premium' : 'discount'}">${isPrem ? '溢价' : '折价'}${level}</span>
                            <strong>${o.name}</strong> <span style="color:var(--text-muted)">${o.code}</span>
                            <div style="margin-top:8px;font-size:13px;color:var(--text-secondary)">
                                净收益:<span style="color:${netRate >= 1 ? 'var(--accent-success)' : netRate >= 0.5 ? 'var(--accent-warning)' : 'var(--text-muted)'}">${netRate >= 0 ? '+' : ''}${netRate.toFixed(2)}%</span>
                                | 规模:${sizeStr} | 成交:${amountStr}
                            </div>
                        </div>
                        <div class="rate-value ${isPrem ? 'positive' : 'negative'}">${o.premium_rate >= 0 ? '+' : ''}${o.premium_rate?.toFixed(2)}%</div>
                    </div>
                `;
            }).join('')}</div>`;
        }
        
        function toggleItem(idx) {
            document.getElementById('item-' + idx).classList.toggle('expanded');
        }
        
        function renderPagination() {
            const total = Math.ceil(filteredData.length / pageSize);
            const pag = document.getElementById('pagination');
            if (total <= 1) { pag.style.display = 'none'; return; }
            pag.style.display = 'flex';
            document.getElementById('page-info').textContent = `第${currentPage}页/共${total}页 (${filteredData.length}条)`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= total;
        }
        
        function prevPage() { if (currentPage > 1) { currentPage--; renderHistory(); renderPagination(); } }
        function nextPage() { const total = Math.ceil(filteredData.length / pageSize); if (currentPage < total) { currentPage++; renderHistory(); renderPagination(); } }
        function changePageSize() { pageSize = parseInt(document.getElementById('page-size').value); currentPage = 1; renderHistory(); renderPagination(); }
        
        function renderCharts() {
            const days = parseInt(document.getElementById('days-filter').value);
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            const data = historyData.filter(r => r.date >= cutoff.toISOString().split('T')[0]).reverse();
            
            const labels = data.map(r => r.date.slice(5));
            
            // 计算平均净收益率
            const netRates = data.map(r => {
                if (!r.opportunities.length) return 0;
                let total = 0;
                r.opportunities.forEach(o => {
                    if (o.premium_rate >= 0) {
                        total += o.premium_rate - 0.28; // 溢价套利
                    } else {
                        total += Math.abs(o.premium_rate) - 1.53; // 折价套利
                    }
                });
                return total / r.opportunities.length;
            });
            
            // 计算溢价/折价数量
            const premiumCounts = data.map(r => r.opportunities.filter(o => o.premium_rate >= 0).length);
            const discountCounts = data.map(r => r.opportunities.filter(o => o.premium_rate < 0).length);
            
            // 计算每日最佳机会净收益
            const bestRates = data.map(r => {
                if (!r.opportunities.length) return 0;
                let best = 0;
                r.opportunities.forEach(o => {
                    let netRate;
                    if (o.premium_rate >= 0) {
                        netRate = o.premium_rate - 0.28;
                    } else {
                        netRate = Math.abs(o.premium_rate) - 1.53;
                    }
                    if (netRate > best) best = netRate;
                });
                return best;
            });
            
            if (rateChart) rateChart.destroy();
            if (countChart) countChart.destroy();
            if (bestChart) bestChart.destroy();
            
            // 净收益率趋势图
            rateChart = new Chart(document.getElementById('rateChart'), {
                type: 'line',
                data: { 
                    labels, 
                    datasets: [{ 
                        label: '平均净收益率%', 
                        data: netRates, 
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0, 255, 136, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3
                    }] 
                },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#fff', font: { size: 11 } } } }, 
                    scales: { 
                        x: { ticks: { color: '#888', font: { size: 10 } } }, 
                        y: { 
                            ticks: { color: '#888', callback: v => v.toFixed(1) + '%', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        } 
                    } 
                }
            });
            
            // 溢价/折价分布图（堆叠柱状图）
            countChart = new Chart(document.getElementById('countChart'), {
                type: 'bar',
                data: { 
                    labels, 
                    datasets: [
                        { label: '溢价套利', data: premiumCounts, backgroundColor: '#00ff88' },
                        { label: '折价套利', data: discountCounts, backgroundColor: '#ffaa00' }
                    ] 
                },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#fff', font: { size: 11 } } } }, 
                    scales: { 
                        x: { ticks: { color: '#888', font: { size: 10 } }, stacked: true }, 
                        y: { ticks: { color: '#888', font: { size: 10 } }, stacked: true } 
                    } 
                }
            });
            
            // 最佳机会趋势图
            bestChart = new Chart(document.getElementById('bestChart'), {
                type: 'line',
                data: { 
                    labels, 
                    datasets: [{ 
                        label: '最佳净收益%', 
                        data: bestRates, 
                        borderColor: '#ff6b7a',
                        backgroundColor: 'rgba(255, 107, 122, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointBackgroundColor: '#ff6b7a'
                    }] 
                },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#fff', font: { size: 11 } } } }, 
                    scales: { 
                        x: { ticks: { color: '#888', font: { size: 10 } } }, 
                        y: { 
                            ticks: { color: '#888', callback: v => v.toFixed(1) + '%', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        } 
                    } 
                }
            });
        }
        
        function exportData() {
            if (!filteredData.length) return alert('无数据可导出');
            let csv = '日期,时间,基金代码,基金名称,类型,场内价格,基金净值,溢价率%\n';
            filteredData.forEach(r => {
                if (r.opportunities.length) {
                    r.opportunities.forEach(o => {
                        csv += `${r.date},${r.time},${o.code},${o.name},${o.premium_rate >= 0 ? '溢价' : '折价'},${o.price},${o.nav},${o.premium_rate}\n`;
                    });
                } else {
                    csv += `${r.date},${r.time},,,无机会,,,\n`;
                }
            });
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lof_history_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
