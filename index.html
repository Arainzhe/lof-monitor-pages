<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOF套利监控 - 历史机会</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1f3460;
            --accent-primary: #00d4ff;
            --accent-secondary: #7b2cbf;
            --accent-success: #00ff88;
            --accent-warning: #ffaa00;
            --accent-danger: #ff4757;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6c6c7c;
            --border-color: #2a2a4a;
            --gradient-premium: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-premium);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            background: var(--gradient-premium);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-text p {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        
        .refresh-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-primary);
        }
        
        .refresh-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .refresh-btn .spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
        }
        
        .stat-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-value.premium {
            color: var(--accent-success);
        }
        
        .stat-value.discount {
            color: var(--accent-warning);
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* Filter Bar */
        .filter-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .filter-select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        /* History List */
        .history-section {
            margin-bottom: 32px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        
        .history-item:hover {
            border-color: var(--accent-primary);
        }
        
        .history-item-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        
        .history-item-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .history-date {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .history-time {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .history-badge {
            background: var(--accent-primary);
            color: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .history-badge.empty {
            background: var(--text-muted);
        }
        
        .history-expand {
            color: var(--text-muted);
            transition: transform 0.2s ease;
        }
        
        .history-item.expanded .history-expand {
            transform: rotate(180deg);
        }
        
        .history-item-content {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .history-item.expanded .history-item-content {
            display: block;
        }
        
        .opportunity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 16px;
        }
        
        .opportunity-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }
        
        .opportunity-main {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .opportunity-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .opportunity-type {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .opportunity-type.premium {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-success);
        }
        
        .opportunity-type.discount {
            background: rgba(255, 170, 0, 0.15);
            color: var(--accent-warning);
        }
        
        .opportunity-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .opportunity-code {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }
        
        .opportunity-details {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .detail-label {
            color: var(--text-muted);
            font-size: 11px;
        }
        
        .detail-value {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .detail-value.positive {
            color: var(--accent-success);
        }
        
        .detail-value.negative {
            color: var(--accent-warning);
        }
        
        .opportunity-rate {
            text-align: right;
        }
        
        .rate-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .rate-value.positive {
            color: var(--accent-success);
        }
        
        .rate-value.negative {
            color: var(--accent-warning);
        }
        
        .rate-label {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .scan-info {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 12px;
            display: flex;
            gap: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-title {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        /* Loading State */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 35, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding: 16px;
        }
        
        .pagination-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .pagination-btn:hover:not(:disabled) {
            background: var(--bg-card-hover);
            border-color: var(--accent-primary);
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-info {
            color: var(--text-secondary);
            font-size: 14px;
            padding: 0 16px;
        }
        
        .page-size-select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--border-color);
            margin-top: 32px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 0 16px;
            }
            
            .container {
                padding: 16px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .opportunity-card {
                grid-template-columns: 1fr;
            }
            
            .opportunity-rate {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📈</div>
                <div class="logo-text">
                    <h1>LOF套利监控</h1>
                    <p>历史机会查看</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="refresh-btn" onclick="loadData()">
                    <span id="refresh-icon">🔄</span>
                    刷新数据
                </button>
            </div>
        </div>
    </header>
    
    <main class="container">
        <div class="stats-grid" id="stats-grid">
            <!-- Stats will be loaded here -->
        </div>
        
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">时间范围:</span>
                <select class="filter-select" id="days-filter" onchange="applyFilter()">
                    <option value="7">最近7天</option>
                    <option value="14">最近14天</option>
                    <option value="30" selected>最近30天</option>
                    <option value="60">最近60天</option>
                    <option value="90">最近90天</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">类型:</span>
                <select class="filter-select" id="type-filter" onchange="applyFilter()">
                    <option value="all">全部</option>
                    <option value="premium">溢价套利</option>
                    <option value="discount">折价套利</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">每页显示:</span>
                <select class="page-size-select" id="page-size" onchange="changePageSize()">
                    <option value="5">5 条</option>
                    <option value="10" selected>10 条</option>
                    <option value="20">20 条</option>
                    <option value="50">50 条</option>
                </select>
            </div>
        </div>
        
        <section class="history-section">
            <div class="section-header">
                <h2 class="section-title">历史记录</h2>
            </div>
            <div class="history-list" id="history-list">
                <!-- History items will be loaded here -->
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;">
                <button class="pagination-btn" id="prev-btn" onclick="prevPage()">上一页</button>
                <span class="pagination-info" id="page-info">第 1 页 / 共 1 页</span>
                <button class="pagination-btn" id="next-btn" onclick="nextPage()">下一页</button>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <p>LOF套利监控工具 | 数据每交易日 10:00、14:30 自动更新</p>
    </footer>
    
    <div class="loading-overlay" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
    </div>
    
    <script>
        let historyData = [];
        let filteredData = [];
        let currentPage = 1;
        let pageSize = 10;
        
        // 加载数据
        async function loadData() {
            const loading = document.getElementById('loading');
            const refreshIcon = document.getElementById('refresh-icon');
            const refreshBtn = document.querySelector('.refresh-btn');
            
            loading.style.display = 'flex';
            refreshIcon.innerHTML = '⏳';
            refreshBtn.classList.add('loading');
            
            try {
                const response = await fetch('data/history.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('无法加载数据');
                }
                historyData = await response.json();
                applyFilter();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('history-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">暂无历史数据</div>
                        <p>监控运行后数据将自动显示</p>
                    </div>
                `;
                document.getElementById('stats-grid').innerHTML = '';
                document.getElementById('pagination').style.display = 'none';
            } finally {
                loading.style.display = 'none';
                refreshIcon.innerHTML = '🔄';
                refreshBtn.classList.remove('loading');
            }
        }
        
        // 应用筛选
        function applyFilter() {
            const days = parseInt(document.getElementById('days-filter').value);
            const type = document.getElementById('type-filter').value;
            
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - days);
            const cutoffStr = cutoffDate.toISOString().split('T')[0];
            
            // 筛选数据
            filteredData = historyData.filter(record => {
                if (record.date < cutoffStr) return false;
                
                if (type !== 'all') {
                    const hasType = record.opportunities.some(opp => {
                        if (type === 'premium') return opp.premium_rate >= 0;
                        if (type === 'discount') return opp.premium_rate < 0;
                        return true;
                    });
                    if (!hasType && record.opportunities.length > 0) return false;
                }
                
                return true;
            });
            
            currentPage = 1;
            renderStats(days);
            renderHistory();
            renderPagination();
        }
        
        // 改变每页数量
        function changePageSize() {
            pageSize = parseInt(document.getElementById('page-size').value);
            currentPage = 1;
            renderHistory();
            renderPagination();
        }
        
        // 上一页
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderHistory();
                renderPagination();
                scrollToTop();
            }
        }
        
        // 下一页
        function nextPage() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderHistory();
                renderPagination();
                scrollToTop();
            }
        }
        
        // 跳转到指定页
        function goToPage(page) {
            currentPage = page;
            renderHistory();
            renderPagination();
            scrollToTop();
        }
        
        // 滚动到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const pageInfo = document.getElementById('page-info');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            const totalPages = Math.ceil(filteredData.length / pageSize);
            
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }
            
            pagination.style.display = 'flex';
            pageInfo.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页 (共 ${filteredData.length} 条)`;
            
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
        }
        
        // 渲染统计
        function renderStats(days) {
            const stats = calculateStats(days);
            
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">运行次数</div>
                    <div class="stat-value">${stats.totalRuns}</div>
                    <div class="stat-change">最近${days}天</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">发现机会</div>
                    <div class="stat-value">${stats.totalOpportunities}</div>
                    <div class="stat-change">平均 ${stats.avgOpportunities} 次/运行</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">溢价套利</div>
                    <div class="stat-value premium">${stats.premiumCount}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">折价套利</div>
                    <div class="stat-value discount">${stats.discountCount}</div>
                </div>
            `;
        }
        
        // 计算统计
        function calculateStats(days) {
            let totalRuns = filteredData.length;
            let totalOpportunities = 0;
            let premiumCount = 0;
            let discountCount = 0;
            
            filteredData.forEach(record => {
                totalOpportunities += record.opportunity_count || 0;
                record.opportunities.forEach(opp => {
                    if (opp.premium_rate >= 0) {
                        premiumCount++;
                    } else {
                        discountCount++;
                    }
                });
            });
            
            return {
                totalRuns,
                totalOpportunities,
                avgOpportunities: totalRuns > 0 ? (totalOpportunities / totalRuns).toFixed(1) : 0,
                premiumCount,
                discountCount
            };
        }
        
        // 渲染历史列表
        function renderHistory() {
            const container = document.getElementById('history-list');
            
            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">暂无记录</div>
                        <p>当前筛选条件下没有数据</p>
                    </div>
                `;
                return;
            }
            
            // 计算当前页数据
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = Math.min(startIndex + pageSize, filteredData.length);
            const pageData = filteredData.slice(startIndex, endIndex);
            
            container.innerHTML = pageData.map((record, index) => {
                const actualIndex = startIndex + index;
                const hasOpportunities = record.opportunities && record.opportunities.length > 0;
                const badgeText = hasOpportunities ? `${record.opportunity_count} 个机会` : '无机会';
                
                return `
                    <div class="history-item" id="item-${actualIndex}">
                        <div class="history-item-header" onclick="toggleItem(${actualIndex})">
                            <div class="history-item-info">
                                <span class="history-date">${record.date}</span>
                                <span class="history-time">${record.time}</span>
                                <span class="history-badge ${hasOpportunities ? '' : 'empty'}">${badgeText}</span>
                            </div>
                            <span class="history-expand">▼</span>
                        </div>
                        <div class="history-item-content">
                            ${hasOpportunities ? renderOpportunities(record.opportunities) : '<p style="padding: 16px 0; color: var(--text-muted);">本次未发现套利机会</p>'}
                            ${renderScanInfo(record.scan_info)}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 渲染机会列表
        function renderOpportunities(opportunities) {
            return `
                <div class="opportunity-list">
                    ${opportunities.map(opp => {
                        const isPremium = opp.premium_rate >= 0;
                        const typeClass = isPremium ? 'premium' : 'discount';
                        const typeText = isPremium ? '溢价' : '折价';
                        const rateClass = isPremium ? 'positive' : 'negative';
                        
                        return `
                            <div class="opportunity-card">
                                <div class="opportunity-main">
                                    <div class="opportunity-header">
                                        <span class="opportunity-type ${typeClass}">${typeText}</span>
                                        <span class="opportunity-name">${opp.name}</span>
                                        <span class="opportunity-code">${opp.code}</span>
                                    </div>
                                    <div class="opportunity-details">
                                        <div class="detail-item">
                                            <span class="detail-label">场内价格</span>
                                            <span class="detail-value">${opp.price?.toFixed(3) || '-'} 元</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">基金净值</span>
                                            <span class="detail-value">${opp.nav?.toFixed(4) || '-'}</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">净值日期</span>
                                            <span class="detail-value">${opp.nav_date || '-'}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="opportunity-rate">
                                    <div class="rate-value ${rateClass}">${opp.premium_rate >= 0 ? '+' : ''}${opp.premium_rate?.toFixed(2) || '-'}%</div>
                                    <div class="rate-label">溢价率</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }
        
        // 渲染扫描信息
        function renderScanInfo(info) {
            if (!info) return '';
            return `
                <div class="scan-info">
                    <span>扫描: ${info.scanned || 0}</span>
                    <span>成功: ${info.success || 0}</span>
                    <span>过滤: ${info.filtered || 0}</span>
                </div>
            `;
        }
        
        // 展开/收起
        function toggleItem(index) {
            const item = document.getElementById(`item-${index}`);
            item.classList.toggle('expanded');
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
