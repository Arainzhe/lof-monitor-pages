<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOF套利监控 - 历史机会</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1f3460;
            --accent-primary: #00d4ff;
            --accent-success: #00ff88;
            --accent-warning: #ffaa00;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6c6c7c;
            --border-color: #2a2a4a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #00d4ff, #7b2cbf); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text h1 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-text p { font-size: 12px; color: var(--text-muted); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .btn:hover { background: var(--bg-card-hover); border-color: var(--accent-primary); }
        .btn.primary { background: var(--accent-primary); color: #000; border: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab { padding: 12px 24px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; }
        .tab:hover { border-color: var(--accent-primary); }
        .tab.active { background: var(--accent-primary); color: #000; border-color: var(--accent-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; transition: all 0.2s; }
        .stat-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-value.premium { color: var(--accent-success); }
        .stat-value.discount { color: var(--accent-warning); }
        
        /* Filter */
        .filter-bar { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-label { font-size: 14px; color: var(--text-secondary); }
        .filter-select, .filter-input { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
        .filter-input { width: 200px; }
        .filter-select:focus, .filter-input:focus { outline: none; border-color: var(--accent-primary); }
        
        /* Chart */
        .chart-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
        .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        
        /* History List */
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: all 0.2s; }
        .history-item:hover { border-color: var(--accent-primary); }
        .history-item-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .history-item-info { display: flex; align-items: center; gap: 16px; }
        .history-date { font-weight: 600; }
        .history-time { font-size: 14px; color: var(--text-muted); }
        .history-badge { background: var(--accent-primary); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .history-badge.empty { background: var(--text-muted); color: var(--text-primary); }
        .history-expand { color: var(--text-muted); transition: transform 0.2s; }
        .history-item.expanded .history-expand { transform: rotate(180deg); }
        .history-item-content { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border-color); }
        .history-item.expanded .history-item-content { display: block; }
        .opportunity-list { display: flex; flex-direction: column; gap: 12px; padding-top: 16px; }
        .opportunity-card { background: var(--bg-secondary); border-radius: 10px; padding: 16px; display: grid; grid-template-columns: 1fr auto; gap: 12px; }
        .opportunity-type { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .opportunity-type.premium { background: rgba(0, 255, 136, 0.15); color: var(--accent-success); }
        .opportunity-type.discount { background: rgba(255, 170, 0, 0.15); color: var(--accent-warning); }
        .rate-value { font-size: 24px; font-weight: 700; }
        .rate-value.positive { color: var(--accent-success); }
        .rate-value.negative { color: var(--accent-warning); }
        .scan-info { background: var(--bg-secondary); border-radius: 8px; padding: 12px 16px; margin-top: 12px; display: flex; gap: 24px; font-size: 12px; color: var(--text-muted); }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; padding: 16px; }
        .pagination-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .pagination-btn:hover:not(:disabled) { background: var(--bg-card-hover); border-color: var(--accent-primary); }
        .pagination-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-info { color: var(--text-secondary); font-size: 14px; padding: 0 16px; }
        
        /* Empty */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        
        /* Loading */
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 15, 35, 0.8); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--border-color); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .footer { text-align: center; padding: 32px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border-color); margin-top: 32px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📈</div>
                <div class="logo-text"><h1>LOF套利监控</h1><p>历史机会查看</p></div>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="exportData()">📥 导出CSV</button>
                <button class="btn" onclick="loadData()">🔄 刷新</button>
            </div>
        </div>
    </header>
    
    <main class="container">
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('list')">📋 历史列表</div>
            <div class="tab" onclick="switchTab('chart')">📊 趋势图表</div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid" id="stats-grid"></div>
        
        <!-- Filter -->
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">搜索:</span>
                <input type="text" class="filter-input" id="search-input" placeholder="基金名称/代码" onkeyup="applyFilter()">
            </div>
            <div class="filter-group">
                <span class="filter-label">时间:</span>
                <select class="filter-select" id="days-filter" onchange="applyFilter()">
                    <option value="7">7天</option>
                    <option value="14">14天</option>
                    <option value="30" selected>30天</option>
                    <option value="60">60天</option>
                    <option value="90">90天</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">类型:</span>
                <select class="filter-select" id="type-filter" onchange="applyFilter()">
                    <option value="all">全部</option>
                    <option value="premium">溢价</option>
                    <option value="discount">折价</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">每页:</span>
                <select class="filter-select" id="page-size" onchange="changePageSize()">
                    <option value="5">5条</option>
                    <option value="10" selected>10条</option>
                    <option value="20">20条</option>
                    <option value="50">50条</option>
                </select>
            </div>
        </div>
        
        <!-- List Tab -->
        <div class="tab-content active" id="tab-list">
            <div class="history-list" id="history-list"></div>
            <div class="pagination" id="pagination" style="display: none;">
                <button class="pagination-btn" id="prev-btn" onclick="prevPage()">上一页</button>
                <span class="pagination-info" id="page-info"></span>
                <button class="pagination-btn" id="next-btn" onclick="nextPage()">下一页</button>
            </div>
        </div>
        
        <!-- Chart Tab -->
        <div class="tab-content" id="tab-chart">
            <div class="chart-container">
                <div class="chart-title">溢价率趋势</div>
                <canvas id="rateChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">机会数量趋势</div>
                <canvas id="countChart"></canvas>
            </div>
        </div>
    </main>
    
    <footer class="footer"><p>LOF套利监控 | 每交易日 10:00、14:30 更新</p></footer>
    <div class="loading-overlay" id="loading" style="display: none;"><div class="loading-spinner"></div></div>
    
    <script>
        let historyData = [];
        let filteredData = [];
        let currentPage = 1;
        let pageSize = 10;
        let rateChart = null;
        let countChart = null;
        
        async function loadData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch('data/history.json?t=' + Date.now());
                historyData = await res.json();
                applyFilter();
            } catch (e) {
                document.getElementById('history-list').innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
            }
            document.getElementById('loading').style.display = 'none';
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'chart') renderCharts();
        }
        
        function applyFilter() {
            const days = parseInt(document.getElementById('days-filter').value);
            const type = document.getElementById('type-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            const cutoffStr = cutoff.toISOString().split('T')[0];
            
            filteredData = historyData.filter(r => {
                if (r.date < cutoffStr) return false;
                // 检查是否有匹配的机会
                const filteredOpps = r.opportunities.filter(o => {
                    // 类型筛选
                    if (type === 'premium' && o.premium_rate < 0) return false;
                    if (type === 'discount' && o.premium_rate >= 0) return false;
                    // 搜索筛选
                    if (search && !o.name.toLowerCase().includes(search) && !o.code.includes(search)) return false;
                    return true;
                });
                return filteredOpps.length > 0 || (r.opportunities.length === 0 && type === 'all');
            });
            
            currentPage = 1;
            renderStats();
            renderHistory();
            renderPagination();
        }
        
        function getFilteredOpportunities(opportunities) {
            const type = document.getElementById('type-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            
            return opportunities.filter(o => {
                if (type === 'premium' && o.premium_rate < 0) return false;
                if (type === 'discount' && o.premium_rate >= 0) return false;
                if (search && !o.name.toLowerCase().includes(search) && !o.code.includes(search)) return false;
                return true;
            });
        }
        
        function renderStats() {
            const type = document.getElementById('type-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            let total = filteredData.length, opps = 0, premium = 0, discount = 0;
            filteredData.forEach(r => {
                const filteredOpps = r.opportunities.filter(o => {
                    if (type === 'premium' && o.premium_rate < 0) return false;
                    if (type === 'discount' && o.premium_rate >= 0) return false;
                    if (search && !o.name.toLowerCase().includes(search) && !o.code.includes(search)) return false;
                    return true;
                });
                opps += filteredOpps.length;
                filteredOpps.forEach(o => o.premium_rate >= 0 ? premium++ : discount++);
            });
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><div class="stat-label">运行次数</div><div class="stat-value">${total}</div></div>
                <div class="stat-card"><div class="stat-label">发现机会</div><div class="stat-value">${opps}</div></div>
                <div class="stat-card"><div class="stat-label">溢价套利</div><div class="stat-value premium">${premium}</div></div>
                <div class="stat-card"><div class="stat-label">折价套利</div><div class="stat-value discount">${discount}</div></div>
            `;
        }
        
        function renderHistory() {
            const container = document.getElementById('history-list');
            if (!filteredData.length) {
                container.innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
                return;
            }
            const start = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(start, start + pageSize);
            
            container.innerHTML = pageData.map((r, i) => {
                const idx = start + i;
                const filteredOpps = getFilteredOpportunities(r.opportunities);
                const has = filteredOpps.length > 0;
                return `
                    <div class="history-item" id="item-${idx}">
                        <div class="history-item-header" onclick="toggleItem(${idx})">
                            <div class="history-item-info">
                                <span class="history-date">${r.date}</span>
                                <span class="history-time">${r.time}</span>
                                <span class="history-badge ${has ? '' : 'empty'}">${has ? filteredOpps.length + '个机会' : '无机会'}</span>
                            </div>
                            <span class="history-expand">▼</span>
                        </div>
                        <div class="history-item-content">
                            ${has ? renderOpps(filteredOpps) : '<p style="padding:16px;color:var(--text-muted)">无套利机会</p>'}
                            <div class="scan-info">扫描:${r.scan_info?.scanned||0} 成功:${r.scan_info?.success||0} 过滤:${r.scan_info?.filtered||0}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderOpps(opps) {
            return `<div class="opportunity-list">${opps.map(o => {
                const isPrem = o.premium_rate >= 0;
                return `
                    <div class="opportunity-card">
                        <div>
                            <span class="opportunity-type ${isPrem ? 'premium' : 'discount'}">${isPrem ? '溢价' : '折价'}</span>
                            <strong>${o.name}</strong> <span style="color:var(--text-muted)">${o.code}</span>
                            <div style="margin-top:8px;font-size:13px;color:var(--text-secondary)">
                                价格:${o.price?.toFixed(3)} | 净值:${o.nav?.toFixed(4)} | 日期:${o.nav_date}
                            </div>
                        </div>
                        <div class="rate-value ${isPrem ? 'positive' : 'negative'}">${o.premium_rate >= 0 ? '+' : ''}${o.premium_rate?.toFixed(2)}%</div>
                    </div>
                `;
            }).join('')}</div>`;
        }
        
        function toggleItem(idx) {
            document.getElementById('item-' + idx).classList.toggle('expanded');
        }
        
        function renderPagination() {
            const total = Math.ceil(filteredData.length / pageSize);
            const pag = document.getElementById('pagination');
            if (total <= 1) { pag.style.display = 'none'; return; }
            pag.style.display = 'flex';
            document.getElementById('page-info').textContent = `第${currentPage}页/共${total}页 (${filteredData.length}条)`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= total;
        }
        
        function prevPage() { if (currentPage > 1) { currentPage--; renderHistory(); renderPagination(); } }
        function nextPage() { const total = Math.ceil(filteredData.length / pageSize); if (currentPage < total) { currentPage++; renderHistory(); renderPagination(); } }
        function changePageSize() { pageSize = parseInt(document.getElementById('page-size').value); currentPage = 1; renderHistory(); renderPagination(); }
        
        function renderCharts() {
            const days = parseInt(document.getElementById('days-filter').value);
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            const data = historyData.filter(r => r.date >= cutoff.toISOString().split('T')[0]).reverse();
            
            const labels = data.map(r => r.date.slice(5));
            const counts = data.map(r => r.opportunity_count);
            const rates = data.map(r => {
                if (!r.opportunities.length) return 0;
                return r.opportunities.reduce((s, o) => s + Math.abs(o.premium_rate), 0) / r.opportunities.length;
            });
            
            if (rateChart) rateChart.destroy();
            if (countChart) countChart.destroy();
            
            rateChart = new Chart(document.getElementById('rateChart'), {
                type: 'line',
                data: { labels, datasets: [{ label: '平均溢价率%', data: rates, borderColor: '#00d4ff', tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { x: { ticks: { color: '#888' } }, y: { ticks: { color: '#888' } } } }
            });
            
            countChart = new Chart(document.getElementById('countChart'), {
                type: 'bar',
                data: { labels, datasets: [{ label: '机会数量', data: counts, backgroundColor: '#7b2cbf' }] },
                options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { x: { ticks: { color: '#888' } }, y: { ticks: { color: '#888' } } } }
            });
        }
        
        function exportData() {
            if (!filteredData.length) return alert('无数据可导出');
            let csv = '日期,时间,基金代码,基金名称,类型,场内价格,基金净值,溢价率%\n';
            filteredData.forEach(r => {
                if (r.opportunities.length) {
                    r.opportunities.forEach(o => {
                        csv += `${r.date},${r.time},${o.code},${o.name},${o.premium_rate >= 0 ? '溢价' : '折价'},${o.price},${o.nav},${o.premium_rate}\n`;
                    });
                } else {
                    csv += `${r.date},${r.time},,,无机会,,,\n`;
                }
            });
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lof_history_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
